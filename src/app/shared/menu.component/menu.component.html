<nav class="w-20 h-full flex flex-col transition-colors duration-300"
    style="background-color: var(--postonsteroids-bg-secondary); border-right: 1px solid var(--postonsteroids-border);">
    <ul class="flex flex-col gap-y-2 p-1">
        @for (item of menu(); track item) {
        <li
            class="menu-item-hover h-[55px] py-1 capitalize flex flex-col justify-center items-center gap-1 rounded-[10px] cursor-pointer transition-all duration-200">
            <mat-icon class="text-[18px]! size-[18px]!">{{ item.icon }}</mat-icon>
            <span class="text-[10px]">{{ item.name }}</span>
        </li>
        }
    </ul>

    <!-- Theme Toggle Button -->
    <div class="mt-auto p-4 flex justify-center">
        <button
            class="theme-toggle-hover w-12 h-12 rounded-full border-0 flex items-center justify-center cursor-pointer transition-all duration-200 shadow-md active:scale-95"
            (click)="toggleTheme()"
            [attr.aria-label]="themeService.isDarkMode() ? 'Switch to light mode' : 'Switch to dark mode'">
            <mat-icon class="text-[20px]! size-[20px]!">{{ themeService.isDarkMode() ? 'light_mode' : 'dark_mode'
                }}</mat-icon>
        </button>
    </div>
</nav>
