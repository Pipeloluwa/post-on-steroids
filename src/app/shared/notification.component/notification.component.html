@if (show()) {
<div

    <div class="flex items-center justify-center w-6 h-6 rounded-full bg-green-500/20">
        <mat-icon class="text-[16px] w-[16px] h-[16px] leading-[16px] text-green-500">check_circle</mat-icon>
    </div>
    <span class="text-[13px] font-medium text-(--postonsteroids-text-primary)">
        {{ message() }}

}
