@if (show()) {
<div (click)="toggleModal()"
    class="fixed inset-0 z-100 flex items-center justify-center p-4 bg-black/60 backdrop-blur-sm animate-in fade-in duration-300">
    <div (click)="$event.stopPropagation()"
        class="w-full max-w-[400px] bg-(--postonsteroids-bg-secondary) rounded-2xl border border-(--postonsteroids-border) shadow-2xl overflow-hidden animate-in zoom-in-95 duration-200">
        <div class="p-6">
            <!-- Header -->
            <div class="flex items-center justify-between mb-8">
                <h2 class="text-xl font-bold text-(--postonsteroids-text-primary)">
                    {{ isOtpSent() ? 'Enter Verification Code' : 'Welcome to PostOnSteroids' }}
                </h2>
                <button (click)="toggleModal()"
                    class="text-(--postonsteroids-text-muted) hover:text-(--postonsteroids-text-primary) transition-colors cursor-pointer">
                    <mat-icon>close</mat-icon>
                </button>
            </div>

            @if (!isOtpSent()) {
            <div class="space-y-4">
                <p class="text-[13px] text-(--postonsteroids-text-secondary)">Enter your email to receive a secure
                    login code.</p>
                <div class="relative">
                    <input type="email" [(ngModel)]="userEmail" placeholder="name@company.com"
                        class="w-full h-12 bg-(--postonsteroids-bg-tertiary) border border-(--postonsteroids-border) rounded-xl px-4 text-[14px] outline-none focus:border-(--postonsteroids-accent) transition-all" />
                </div>
                <button (click)="onSendOtp.emit()" [disabled]="isAuthenticating()"
                    class="w-full h-12 bg-(--postonsteroids-accent) hover:bg-(--postonsteroids-accent-hover) disabled:opacity-50 text-white font-bold rounded-xl transition-all shadow-lg shadow-(--postonsteroids-accent)/20 flex items-center justify-center gap-x-2 cursor-pointer">
                    @if (isAuthenticating()) {
                    <div class="w-5 h-5 border-2 border-white/30 border-t-white rounded-full animate-spin"></div>
                    Sending...
                    } @else {
                    Send Login Code
                    }
                </button>
            </div>
            } @else {
            <div class="space-y-4 font-bold">
                <p class="text-[13px] text-(--postonsteroids-text-secondary)">We've sent a 6-digit code to <span
                        class="text-(--postonsteroids-text-primary)">{{ userEmail() }}</span></p>
                <div class="flex justify-between gap-x-2">
                    <input type="text" [(ngModel)]="otp" placeholder="Enter Code"
                        class="w-full h-12 bg-(--postonsteroids-bg-tertiary) border border-(--postonsteroids-border) rounded-xl px-4 text-[18px] text-center tracking-[0.5em] outline-none focus:border-(--postonsteroids-accent) transition-all" />
                </div>
                <button (click)="onAuthenticate.emit()" [disabled]="isAuthenticating()"
                    class="w-full h-12 bg-(--postonsteroids-accent) hover:bg-(--postonsteroids-accent-hover) disabled:opacity-50 text-white font-bold rounded-xl transition-all shadow-lg shadow-(--postonsteroids-accent)/20 flex items-center justify-center gap-x-2 cursor-pointer">
                    @if (isAuthenticating()) {
                    <div class="w-5 h-5 border-2 border-white/30 border-t-white rounded-full animate-spin"></div>
                    Verifying...
                    } @else {
                    Authenticate
                    }
                </button>
                <button (click)="onBackToEmail.emit()"
                    class="w-full text-[12px] text-(--postonsteroids-text-muted) hover:text-(--postonsteroids-accent) transition-colors cursor-pointer">
                    Back to email
                </button>
            </div>
            }
        </div>

        <!-- Footer -->
        <div class="bg-(--postonsteroids-bg-tertiary) p-4 border-t border-(--postonsteroids-border)">
            <p class="text-[11px] text-center text-(--postonsteroids-text-muted)">
                By continuing, you agree to our Terms of Service and Privacy Policy.
            </p>
        </div>
    </div>
</div>
}
