@if (isOpen()) {
<div class="fixed inset-0 z-100 flex items-center justify-center bg-black/60 backdrop-blur-sm" (click)="close()">
    <div class="w-[600px] max-h-[80vh] bg-(--postonsteroids-bg-primary) border border-(--postonsteroids-border) rounded-xl shadow-2xl flex flex-col overflow-hidden animate-in fade-in zoom-in duration-200"
        (click)="stopProp($event)">
        <!-- Header -->
        <div class="p-4 border-b border-(--postonsteroids-border) flex items-center justify-between">
            <div class="flex items-center gap-x-2">
                <mat-icon class="text-(--postonsteroids-accent)">variables</mat-icon>
                <h2 class="text-lg font-semibold text-(--postonsteroids-text-primary)">Global Variables</h2>
            </div>
            <button (click)="close()" class="p-1 hover:bg-(--postonsteroids-bg-hover) rounded-md transition-colors cursor-pointer">
                <mat-icon class="text-(--postonsteroids-text-muted)">close</mat-icon>
            </button>
        </div>

        <!-- Content -->
        <div class="flex-1 overflow-y-auto p-4 space-y-4">
            <p class="text-sm text-(--postonsteroids-text-muted)">
                Define global variables that can be used in your URLs, headers, and bodies using
                <code
                    class="px-1 py-0.5 bg-(--postonsteroids-bg-secondary) rounded text-(--postonsteroids-accent)">{{ '{' }}{{ '{' }}variable_name{{ '}' }}{{ '}' }}</code>
                syntax.
            </p>

            <div class="space-y-2">
                <div
                    class="grid grid-cols-[30px_1fr_1fr_40px] gap-x-3 px-2 text-xs font-medium text-(--postonsteroids-text-muted) uppercase tracking-wider">
                    <span></span>
                    <span>Key</span>
                    <span>Value</span>
                    <span></span>
                </div>

                @for (v of variableService.variables(); track v.id) {
                <div
                    class="grid grid-cols-[30px_1fr_1fr_40px] gap-x-3 items-center p-2 bg-(--postonsteroids-bg-secondary) rounded-lg border border-(--postonsteroids-border) group">
                    <input type="checkbox" [checked]="v.enabled" (change)="toggleEnabled(v)"
                        class="accent-(--postonsteroids-accent) cursor-pointer">
                    <input type="text" [(ngModel)]="v.key" (blur)="updateVar(v)" placeholder="Variable Name"
                        class="bg-transparent border-none outline-none text-sm text-(--postonsteroids-text-primary) placeholder:text-(--postonsteroids-text-muted)">
                    <input type="text" [(ngModel)]="v.value" (blur)="updateVar(v)" placeholder="Value"
                        class="bg-transparent border-none outline-none text-sm text-(--postonsteroids-text-secondary) placeholder:text-(--postonsteroids-text-muted)">
                    <button (click)="removeVar(v.id)"
                        class="p-1 opacity-0 group-hover:opacity-100 hover:text-red-500 transition-all cursor-pointer">
                        <mat-icon class="text-[18px]! size-[18px]!">delete</mat-icon>
                    </button>
                </div>
                }

                <button (click)="addVar()"
                    class="w-full py-2 border-2 border-dashed border-(--postonsteroids-border) rounded-lg text-sm text-(--postonsteroids-text-muted) hover:border-(--postonsteroids-accent) hover:text-(--postonsteroids-accent) transition-all flex items-center justify-center gap-x-2 cursor-pointer">
                    <mat-icon class="text-[18px]! size-[18px]!">add</mat-icon>
                    Add New Variable
                </button>
            </div>
        </div>

        <!-- Footer -->
        <div class="p-4 bg-(--postonsteroids-bg-secondary) border-t border-(--postonsteroids-border) flex justify-end">
            <button (click)="close()"
                class="px-6 py-2 bg-(--postonsteroids-accent) text-white font-semibold rounded-lg hover:brightness-110 transition-all shadow-lg active:scale-95 cursor-pointer">
                Done
            </button>
        </div>
    </div>
</div>
}
