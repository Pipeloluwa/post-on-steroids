@if (formInput) {
<form [formGroup]="formInput" (ngSubmit)="submitData()" class="w-full h-full flex transition-colors duration-300"
    [style.background-color]="'var(--postonsteroids-bg-primary)'">
    <json-editor formControlName="dataInput" [options]="editorOptions" (change)="getData($event)"
        class="w-full h-full">
    </json-editor>
</form>
}
