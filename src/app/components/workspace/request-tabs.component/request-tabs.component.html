<div
    class="w-full flex items-center justify-between h-[38px] bg-(--postonsteroids-bg-primary) border-b border-(--postonsteroids-border) select-none">


    <!-- History Navigation -->
    <div class="flex items-center h-full border-r border-(--postonsteroids-border)">
        <button (click)="goBack()" [disabled]="historyIndex() === 0"
            class="h-full px-2 flex items-center cursor-pointer hover:bg-(--postonsteroids-bg-hover) disabled:opacity-30 disabled:cursor-not-allowed group transition-colors">
            <mat-icon
                class="text-[18px]! size-[18px]! text-(--postonsteroids-text-muted) group-hover:text-(--postonsteroids-text-primary)">arrow_back</mat-icon>
        </button>
        <button (click)="goForward()" [disabled]="historyIndex() === historyStack().length - 1"
            class="h-full px-2 flex items-center cursor-pointer hover:bg-(--postonsteroids-bg-hover) disabled:opacity-30 disabled:cursor-not-allowed group transition-colors">
            <mat-icon
                class="text-[18px]! size-[18px]! text-(--postonsteroids-text-muted) group-hover:text-(--postonsteroids-text-primary)">arrow_forward</mat-icon>
        </button>
    </div>

    <button (click)="scrollLeft()" [disabled]="!canScrollLeft()"
        class="h-full flex items-center px-1 border-r border-(--postonsteroids-border) hover:bg-(--postonsteroids-bg-hover) transition-colors disabled:opacity-30 disabled:cursor-not-allowed cursor-pointer">
        <mat-icon class="text-[20px]! size-[20px]! text-(--postonsteroids-text-muted)">chevron_left</mat-icon>
    </button>

    <!-- Tabs Container -->
    <div #scrollContainer
        class="w-full h-full flex items-center overflow-hidden overflow-x-auto no-scrollbar scroll-smooth">
        @for (tab of tabs(); track tab.id) {
        <div (click)="setActiveTab(tab.id)" [title]="tab.name"
            class="relative flex items-center h-full pl-3 pr-1 gap-x-2 border-r border-(--postonsteroids-border) cursor-pointer hover:bg-(--postonsteroids-bg-hover) group min-w-fit"
            [class.bg-(--postonsteroids-bg-secondary)]="activeTabId() === tab.id" [id]="'tab'+tab.id">

            <!-- Method -->
            <span class="text-[9px] font-bold uppercase" [style.color]="getMethodColor(tab.method)">
                {{ tab.method }}
            </span>

            <!-- Name/URL -->
            <span class="text-[11px] text-(--postonsteroids-text-secondary) truncate max-w-[120px]">
                {{ tab.name }}
            </span>

            <!-- Dirty Indicator (Dot) -->
            @if (tab.isDirty) {
            <div class="w-[6px] h-[6px] rounded-full bg-(--postonsteroids-accent)"></div>
            }

            <!-- Active Tab Bottom Indicator -->
            @if (activeTabId() === tab.id) {
            <div class="absolute bottom-0 left-0 right-0 h-[2px] bg-(--postonsteroids-accent)"></div>
            }

            <button (click)="closeTab(tab.id, $event)" class="flex">
                <mat-icon
                    class="text-[16px]! size-[16px]!  ml-auto opacity-0 group-hover:opacity-100 cursor-pointer">close</mat-icon>
            </button>
        </div>
        }
    </div>

    <!-- Scroll Right Arrow -->
    <button (click)="scrollRight()" [disabled]="!canScrollRight()"
        class="h-full flex items-center px-1 border-l border-(--postonsteroids-border) hover:bg-(--postonsteroids-bg-hover) transition-colors disabled:opacity-30 disabled:cursor-not-allowed cursor-pointer">
        <mat-icon class="text-[20px]! size-[20px]! text-(--postonsteroids-text-muted)">chevron_right</mat-icon>
    </button>


    <!-- Add Tab Button -->
    <div (click)="addTab()"
        class="h-full flex items-center px-2 border-r border-(--postonsteroids-border) cursor-pointer hover:bg-(--postonsteroids-bg-hover)">
        <mat-icon class="flex text-[18px]! size-[18px]! text-(--postonsteroids-text-secondary)">add</mat-icon>
    </div>

    <!-- More Options (Endpoints Modal) -->
    <div
        class="h-full flex items-center px-1 border-r border-(--postonsteroids-border) cursor-pointer hover:bg-(--postonsteroids-bg-hover)">
        <app-scrollable-select-component [optionValues]="endpoints()" [searchable]="true" [verticalPosition]="32"
            [modalWidth]="300" [modalHeight]="600" [absoluteStartLeft]="false"
            (outputSelectedValue)="selectEndpoint($event)">
            <mat-icon class="pt-[3px] text-[20px]! size-[20px]! text-(--postonsteroids-text-muted)">search</mat-icon>
        </app-scrollable-select-component>
    </div>

    <!-- Right Section: Auto Auth & Variables -->
    <div class="flex items-center h-full border-l border-(--postonsteroids-border)">

        <!-- Global Variables Button -->
        <button (click)="openVariableModal()"
            class="h-full px-3 flex items-center gap-x-2 border-r border-(--postonsteroids-border) hover:bg-(--postonsteroids-bg-hover) transition-colors group"
            title="Manage Global Variables">
            <mat-icon
                class="text-[18px]! size-[18px]! text-(--postonsteroids-text-muted) group-hover:text-(--postonsteroids-accent)">variables</mat-icon>
            <span class="text-[11px] text-(--postonsteroids-text-secondary) font-medium">Variables</span>
        </button>

        <!-- Auto Auth Toggle -->
        <div (click)="toggleAutoAuth()"
            class="flex items-center h-full px-3 gap-x-2 cursor-pointer hover:bg-(--postonsteroids-bg-hover) transition-colors"
            [title]="'We will inteligently read your auth endpoint response and automatically add it as header to every of your request'">

            <span class="text-[11px] text-(--postonsteroids-text-secondary) whitespace-nowrap">
                Auto Auth
            </span>

            <div class="relative w-8 h-4 rounded-full transition-colors duration-200 focus:outline-none cursor-pointer"
                [class.bg-(--postonsteroids-accent)]="autoAuthEnabled()"
                [class.bg-(--postonsteroids-bg-tertiary)]="!autoAuthEnabled()">
                <div class="absolute top-[2px] left-[2px] w-3 h-3 bg-white rounded-full transition-transform duration-200"
                    [class.translate-x-4]="autoAuthEnabled()"></div>
            </div>
        </div>
    </div>

</div>

<app-variable-modal #variableModal />
