<div class="w-full h-full flex flex-col overflow-hidden workspace-container">
    <app-request-tabs-component />

    <div class="w-full h-full p-2 flex flex-col">

        <!-- Request Section -->
        <div [style.height.px]="requestHeight()" class="flex flex-col gap-y-4 shrink-0 overflow-hidden"
            [class.transition-[height]]="!isResizing()">
            <div>
                <app-request-details-component [isLoggedIn]="authService.isLoggedIn()"
                    (onAuthRequired)="toggleAuthModal()" (onNotify)="triggerNotification($event)" />
                <app-request-url-component />
            </div>

            <div class="shrink-0">
                <app-payload-types-component></app-payload-types-component>
                <app-body-types-component></app-body-types-component>
            </div>

            <div class="flex-1 min-h-0">
                <ng-container *ngComponentOutlet="jsonComponent(); inputs: { data: jsonData }" />
            </div>
        </div>

        <!-- Resize Handle -->
        <div (mousedown)="startResizing($event)"
            class="h-[16px] w-full cursor-ns-resize hover:bg-(--postonsteroids-accent)/30 transition-colors duration-200 rounded-full z-10"
            [class]="{ 'bg-(--postonsteroids-accent)/50': isResizing() }">
        </div>

        <!-- Response Section -->
        <div class="h-full min-h-0 flex ">
            <app-response-viewer-component />
        </div>

    </div>
</div>
