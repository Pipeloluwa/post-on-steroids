<div class="w-full h-full flex flex-col overflow-hidden workspace-container relative">
    @if (tabStateService.isCollectionLoading()) {
    <div
        class="absolute inset-0 z-100 flex items-center justify-center bg-(--postonsteroids-bg-primary)/40 backdrop-blur-[1px]">
        <div class="flex flex-col items-center gap-y-3">
            <mat-icon class="animate-spin text-(--postonsteroids-accent) w-8! h-8! text-[32px]!">sync</mat-icon>
            <span
                class="text-[12px] font-medium text-(--postonsteroids-text-secondary) animate-pulse uppercase tracking-widest">Fetching
                Collection...</span>
        </div>
    </div>
    }
    <app-request-tabs-component />

    <div class="w-full h-full p-2 flex flex-col">
        <!-- Request Section -->
        <div [style.height.px]="requestHeight()" class="flex flex-col gap-y-2 shrink-0"
            [class.transition-[height]]="!isResizing()">
            <div>
                <app-request-details-component [isLoggedIn]="authService.isLoggedIn()"
                    (onAuthRequired)="toggleAuthModal()" (onNotify)="triggerNotification($event)" />
                <app-request-url-component />
            </div>

            <div class="flex flex-col min-h-0"
                [class.flex-1]="tabStateService.activeTabState()?.payloadType === 'scripts'"
                [class.shrink-0]="tabStateService.activeTabState()?.payloadType !== 'scripts'">
                <app-payload-types-component class="flex-1 flex flex-col min-h-0 w-full"></app-payload-types-component>
            </div>

            @if (
                tabStateService.activeTabState()?.payloadType === 'body'
                && tabStateService.activeTabState()?.bodyType === 'raw'
            )
            {
            <div class="flex-1 min-h-0">
                <ng-container *ngComponentOutlet="jsonComponent(); inputs: { data: requestJsonData() }" />
            </div>
            }
        </div>

        <!-- Resize Handle -->
        <div (mousedown)="startResizing($event)"
            class="h-[6px] w-full shrink-0 cursor-ns-resize hover:bg-(--postonsteroids-accent)/30 transition-colors duration-200 rounded-full z-10"
            [class]="{ 'bg-(--postonsteroids-accent)/50': isResizing() }">
        </div>

        <!-- Response Section -->
        <div class="h-full min-h-0 flex border-t border-(--postonsteroids-accent)/40">
            <app-response-viewer-component />
        </div>

    </div>
</div>
