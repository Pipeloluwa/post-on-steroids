<div class="flex items-center gap-x-2 w-full h-[40px]">
    <!-- Method and URL Input Container -->
    <div class="flex-1 flex items-center h-full border rounded-[4px] px-2"
        style="background-color: var(--postonsteroids-bg-secondary); border-color: var(--postonsteroids-border);">

        <!-- Method Selector -->
        <div class="h-full flex items-center pr-2" style="border-right: 1px solid var(--postonsteroids-border);">
            <app-scrollable-select-component [activeValue]="selectedMethod()" [optionValues]="methods"
                [verticalPosition]="35" [modalWidth]="120" (outputSelectedValue)="setMethod($event)"
                [itemColor]="getMethodColor" [activeItemColor]="getMethodColor" [uppercase]="true">

                <div class="flex items-center gap-x-1 cursor-pointer">
                    <span class="font-bold text-[13px] uppercase" [style.color]="getMethodColor(selectedMethod())">
                        {{ selectedMethod() }}
                    </span>
                    <mat-icon class="text-[16px] w-[16px] h-[16px] leading-[16px] opacity-60">expand_more</mat-icon>
                </div>
            </app-scrollable-select-component>
        </div>

        <!-- URL Input & Resolved Display -->
        <div class="flex-1 flex flex-col justify-center h-full">
            <input #urlInput type="text" [(ngModel)]="url" (ngModelChange)="onUrlChange($event)"
                placeholder="Enter request URL" (click)="updateCursorPosition($event)"
                (keyup)="updateCursorPosition($event)"
                class="w-full bg-transparent border-none font-mono outline-none px-3 text-[13px] text-(--postonsteroids-text-primary)" />

            <app-scrollable-select-component [manualState]="suggestions().length !== 0" [optionValues]="suggestions()"
                [verticalPosition]="35" [modalWidth]="150" [absoluteStartLeft]="cursorOffset()"
                (outputSelectedValue)="setSuggestion($event)">
            </app-scrollable-select-component>

            @if (url().includes('{{')) {
            <input type="text" [value]="resolvedUrl()" readonly
                class="px-3 text-[10px] text-(--postonsteroids-accent) opacity-70 truncate max-w-full">
            }
        </div>
    </div>

    <!-- Send Button Group -->
    <div class="flex h-full rounded-[4px] overflow-hidden">
        <button (click)="onSend()" [disabled]="isLoading()"
            class="bg-[#097BED] hover:bg-[#0766C6] disabled:opacity-50 disabled:cursor-not-allowed text-white px-10 font-bold text-[13px] flex items-center h-full transition-colors duration-200 cursor-pointer min-w-[120px] justify-center">
            @if (isLoading()) {
                <div class="flex items-center gap-2">
                    <div class="w-3 h-3 border-2 border-white/30 border-t-white rounded-full animate-spin"></div>
                    <span>Sending...</span>
                </div>
            } @else {
                Send
            }
        </button>
    </div>
</div>
