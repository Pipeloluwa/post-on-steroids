<div class="p-6 h-full bg-(--postonsteroids-bg-primary)">
    <h2 class="text-xl font-bold text-(--postonsteroids-text-primary) mb-8">Export Data</h2>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <div (click)="exportAsJson()"
            class="p-6 rounded-2xl bg-(--postonsteroids-bg-secondary) border border-(--postonsteroids-border) hover:border-(--postonsteroids-accent) hover:bg-(--postonsteroids-bg-hover) transition-all cursor-pointer group">
            <div class="flex items-center gap-x-4">
                <div
                    class="size-12 rounded-xl bg-orange-500/10 flex items-center justify-center text-orange-500 group-hover:bg-orange-500 group-hover:text-white transition-all">
                    <mat-icon class="text-[24px]">code</mat-icon>
                </div>
                <div>
                    <h3 class="font-bold text-(--postonsteroids-text-primary)">Export All as JSON</h3>
                    <p class="text-[12px] text-(--postonsteroids-text-secondary)">Download all your collections
                        in a single JSON file.</p>
                </div>
            </div>
        </div>
    </div>

    <div class="mt-8 flex flex-col gap-4">
        <div class="flex items-center justify-between">
            <h3 class="text-lg font-bold text-(--postonsteroids-text-primary)">Select Collections to Export</h3>
            <button (click)="exportSelected()" [disabled]="selectedCollections().size === 0"
                class="px-4 py-2 bg-(--postonsteroids-accent) hover:bg-(--postonsteroids-accent-hover) text-white font-bold rounded-lg transition-all cursor-pointer disabled:opacity-50 disabled:cursor-not-allowed flex items-center gap-2">
                <mat-icon>file_download</mat-icon>
                Export Selected ({{ selectedCollections().size }})
            </button>
        </div>

        <div class="space-y-2">
            @for (item of collections(); track item.id) {
            <div class="flex items-center gap-4 p-4 rounded-xl bg-(--postonsteroids-bg-secondary) border border-(--postonsteroids-border) hover:border-(--postonsteroids-accent)/50 transition-all">
                <input type="checkbox" 
                    [checked]="selectedCollections().has(item.id)"
                    (change)="toggleSelection(item.id)"
                    class="accent-(--postonsteroids-accent) cursor-pointer w-5 h-5" />
                <div class="flex-1">
                    <h4 class="font-bold text-(--postonsteroids-text-primary)">{{ item.name }}</h4>
                    <p class="text-[11px] text-(--postonsteroids-text-muted)">Created {{ item.createdAt | date:'medium' }}</p>
                </div>
            </div>
            }
        </div>
    </div>
</div>
